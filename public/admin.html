<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 페이지 - 설문 응답 현황</title>
<style>
  :root{--primary:#1a3a6b;--primary-light:#2a5298;--accent:#c8a94a;--bg:#f0f3f8;--card:#fff;--border:#dce3ed;--text:#1e2633;--muted:#5a6577;--green:#16a34a;--radius:12px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  .topbar{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
  .topbar h1{font-size:18px;font-weight:700}
  .topbar-right{display:flex;gap:12px;align-items:center}
  .btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:opacity .2s}
  .btn:hover{opacity:.85}
  .btn-export{background:var(--accent);color:#1a3a6b}
  .btn-refresh{background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3)}
  .container{max-width:1200px;margin:0 auto;padding:28px 24px}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
  .stat-card{background:var(--card);border-radius:var(--radius);padding:20px 22px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-left:4px solid var(--primary)}
  .stat-card.green{border-left-color:var(--green)}
  .stat-card.gold{border-left-color:var(--accent)}
  .stat-num{font-size:32px;font-weight:800;color:var(--primary);line-height:1}
  .stat-card.green .stat-num{color:var(--green)}
  .stat-card.gold .stat-num{color:#92700a}
  .stat-label{font-size:12px;color:var(--muted);margin-top:6px}
  .panel{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:24px;overflow:hidden}
  .panel-header{background:var(--primary);color:white;padding:14px 20px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
  .panel-body{padding:20px}
  .chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-bottom:24px}
  .bar-item{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
  .bar-label{min-width:100px;color:var(--muted);flex-shrink:0}
  .bar-track{flex:1;background:#eef2f8;border-radius:6px;height:20px;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:6px;transition:width .6s ease;display:flex;align-items:center;padding-left:6px;font-size:11px;color:white;font-weight:600;white-space:nowrap}
  .bar-count{min-width:28px;text-align:right;font-weight:600;color:var(--primary)}
  .table-wrap{overflow-x:auto}
  table.resp-table{width:100%;border-collapse:collapse;font-size:13px}
  table.resp-table th{background:var(--primary);color:white;padding:10px 12px;text-align:left;white-space:nowrap;font-weight:600}
  table.resp-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top;max-width:200px;word-break:break-word}
  table.resp-table tr:nth-child(even){background:#f8fafc}
  table.resp-table tr:hover{background:#eef2f8}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .badge-new{background:#dcfce7;color:#166534}
  .empty{text-align:center;padding:60px;color:var(--muted);font-size:15px}
  .loading{text-align:center;padding:40px;color:var(--muted)}
  .tag-list{display:flex;flex-wrap:wrap;gap:4px}
  .tag{background:#eef2f8;color:var(--primary);padding:2px 7px;border-radius:6px;font-size:11px}
  @media(max-width:600px){.topbar{padding:14px 16px}.container{padding:16px 12px}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="topbar">
  <h1>📊 설문 관리자 대시보드</h1>
  <div class="topbar-right">
    <button class="btn btn-refresh" onclick="loadData()">새로고침</button>
    <button class="btn btn-export" onclick="exportCSV()">CSV 내보내기</button>
  </div>
</div>

<div class="container">
  <div class="stats-grid" id="stats-grid">
    <div class="loading">데이터 불러오는 중...</div>
  </div>

  <div class="chart-grid" id="charts"></div>

  <div class="panel">
    <div class="panel-header">📋 전체 응답 목록</div>
    <div class="panel-body">
      <div class="table-wrap" id="table-wrap">
        <div class="loading">불러오는 중...</div>
      </div>
    </div>
  </div>
</div>

<script>
const LABELS = {
  lk1:'생성형AI 이해', lk2:'프롬프트 엔지니어링', lk3:'AI Agent',
  lk4:'업무자동화', lk5:'데이터 수집·정제', lk6:'API 이해',
  lk7:'노코드·로우코드', lk8:'다국어 AI', lk9:'프로젝트 문제해결',
  lk10:'협업·커뮤니케이션', lk11:'AI 윤리·검증'
};

async function loadData() {
  try {
    const [statsRes, respRes] = await Promise.all([
      fetch('/api/stats'), fetch('/api/responses')
    ]);
    const stats = await statsRes.json();
    const data = await respRes.json();
    renderStats(stats, data);
    renderCharts(stats, data);
    renderTable(data.responses);
  } catch(e) {
    document.getElementById('stats-grid').innerHTML = '<div class="empty">데이터를 불러올 수 없습니다.</div>';
  }
}

function renderStats(stats, data) {
  const today = new Date().toISOString().slice(0,10);
  const todayCount = data.responses.filter(r => r.submitted_at.slice(0,10) === today).length;
  const avgLikert = calcAvgLikert(data.responses);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card green">
      <div class="stat-num">${stats.total}</div>
      <div class="stat-label">총 응답 수</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${todayCount}</div>
      <div class="stat-label">오늘 응답</div>
    </div>
    <div class="stat-card gold">
      <div class="stat-num">${avgLikert}</div>
      <div class="stat-label">역량 중요도 평균 (5점)</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${data.responses.filter(r=>r.opinion_additional).length}</div>
      <div class="stat-label">주관식 응답 수</div>
    </div>
  `;
}

function calcAvgLikert(responses) {
  if (!responses.length) return '-';
  let sum = 0, cnt = 0;
  responses.forEach(r => {
    for (let i=1; i<=11; i++) {
      const v = parseFloat(r['lk'+i]);
      if (!isNaN(v)) { sum += v; cnt++; }
    }
  });
  return cnt ? (sum/cnt).toFixed(2) : '-';
}

function bar(label, count, max) {
  const pct = max > 0 ? Math.round(count/max*100) : 0;
  return `<div class="bar-item">
    <span class="bar-label">${label}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%">${pct > 15 ? count+'명' : ''}</div></div>
    <span class="bar-count">${count}</span>
  </div>`;
}

function chartPanel(title, items) {
  const max = Math.max(...items.map(i => i.count), 1);
  return `<div class="panel">
    <div class="panel-header">${title}</div>
    <div class="panel-body">${items.map(i => bar(i.key, i.count, max)).join('')}</div>
  </div>`;
}

function renderCharts(stats, data) {
  const map = (arr, keyField) => arr.map(r => ({key: r[keyField]||'미응답', count: r.count}));

  // Likert 평균
  const likertItems = Object.entries(LABELS).map(([k, label]) => {
    const vals = data.responses.map(r => parseFloat(r[k])).filter(v => !isNaN(v));
    const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
    return {key: label, count: Math.round(avg*10)/10};
  }).sort((a,b) => b.count - a.count);

  const maxLikert = 5;
  const likertBars = likertItems.map(i => {
    const pct = Math.round(i.count/maxLikert*100);
    return `<div class="bar-item">
      <span class="bar-label">${i.key}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%">${pct > 15 ? i.count+'점' : ''}</div></div>
      <span class="bar-count">${i.count}</span>
    </div>`;
  }).join('');

  document.getElementById('charts').innerHTML =
    chartPanel('성별 분포', map(stats.byGender, 'gender')) +
    chartPanel('연령대 분포', map(stats.byAge, 'age_group')) +
    chartPanel('기관 유형', map(stats.byOrg, 'org_type')) +
    chartPanel('경력 분포', map(stats.byCareer, 'career')) +
    `<div class="panel"><div class="panel-header">역량 중요도 평균 (5점 기준)</div><div class="panel-body">${likertBars}</div></div>`;
}

function renderTable(responses) {
  if (!responses || !responses.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty">아직 응답이 없습니다.</div>';
    return;
  }

  const tags = (v) => v ? v.split(', ').map(t=>`<span class="tag">${t}</span>`).join('') : '-';
  const val = v => v || '-';
  const dt = v => v ? v.replace('T',' ').slice(0,16) : '-';

  const rows = responses.map((r, i) => `
    <tr>
      <td><span class="badge badge-new">#${r.id}</span></td>
      <td>${dt(r.submitted_at)}</td>
      <td>${val(r.gender)}</td>
      <td>${val(r.age_group)}</td>
      <td>${val(r.org_type)}</td>
      <td>${val(r.career)}</td>
      <td>${val(r.ai_importance) !== '-' ? '★'.repeat(parseInt(r.ai_importance)||0) : '-'}</td>
      <td><div class="tag-list">${tags(r.ai_fields)}</div></td>
      <td>${r.lk1||'-'} / ${r.lk2||'-'} / ${r.lk3||'-'}</td>
      <td style="max-width:160px">${val(r.opinion_additional)}</td>
    </tr>`).join('');

  document.getElementById('table-wrap').innerHTML = `
    <table class="resp-table">
      <thead><tr>
        <th>No.</th><th>제출일시</th><th>성별</th><th>연령</th><th>기관</th>
        <th>경력</th><th>AI중요도</th><th>AI활용분야</th><th>역량(1/2/3)</th><th>추가의견</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function exportCSV() {
  window.location.href = '/api/export';
}

loadData();
setInterval(loadData, 60000); // 1분마다 자동 갱신
</script>
</body>
</html>
